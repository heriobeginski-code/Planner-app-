<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handshake Hub | Management Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        /* Glare Card Effect */
        .glare-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glare-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
        .glow-pink {
            border-color: #ff007f !important;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.4);
            animation: pulse-pink 2s infinite;
        }
        @keyframes pulse-pink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        /* Hide Scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- MOCK DATA & STORAGE LOGIC ---
        const INITIAL_CATEGORIES = [
            { id: 'work', name: 'Work', icon: '💼' },
            { id: 'personal', name: 'Personal', icon: '👤' },
            { id: 'kids', name: 'Kids', icon: '👶' }
        ];

        const App = () => {
            const [view, setView] = useState('dashboard'); // dashboard, calendar, stack
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('hs_items') || '[]'));
            const [categories, setCategories] = useState(INITIAL_CATEGORIES);
            const [activeGlow, setActiveGlow] = useState(null); // ID of category glowing pink
            const [isFormOpen, setIsFormOpen] = useState(false);

            // Handshake Listener
            useEffect(() => {
                const handleStorage = (e) => {
                    if (e.key === 'logic_brain_dump') {
                        const newData = JSON.parse(e.newValue);
                        setActiveGlow(newData.targetCategory || 'work');
                        // Push notification logic
                        if (Notification.permission === "granted") {
                            new Notification("Logic Handshake Received", { body: "New items processed in Logic app." });
                        }
                    }
                };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, []);

            useEffect(() => {
                localStorage.setItem('hs_items', JSON.stringify(items));
            }, [items]);

            const addItem = (newItem) => {
                setItems([...items, { ...newItem, id: Date.now(), completed: false }]);
                setIsFormOpen(false);
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Top Pill Bar */}
                    <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-md">
                        <div 
                            onClick={() => setIsFormOpen(true)}
                            className="glare-card rounded-full px-6 py-3 flex justify-between items-center cursor-pointer hover:scale-105 transition-transform"
                        >
                            <span className="text-sm font-light text-gray-400">Add Task, Bill or Appt...</span>
                            <div className="bg-white/10 p-1 rounded-full">+</div>
                        </div>
                    </div>

                    <main className="pt-24 px-6 max-w-5xl mx-auto">
                        {view === 'dashboard' && <Dashboard categories={categories} activeGlow={activeGlow} setView={setView} />}
                        {view === 'stack' && <QuickStack items={items.filter(i => !i.completed)} />}
                        {view === 'calendar' && <CalendarView items={items} />}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 glare-card rounded-3xl p-2 flex gap-2 z-50">
                        {['dashboard', 'calendar', 'stack'].map(v => (
                            <button 
                                key={v}
                                onClick={() => setView(v)}
                                className={`px-6 py-2 rounded-2xl capitalize transition-all ${view === v ? 'bg-white/10' : 'text-gray-500'}`}
                            >
                                {v}
                            </button>
                        ))}
                    </nav>

                    {/* Form Modal */}
                    <AnimatePresence>
                        {isFormOpen && <EntryForm onAdd={addItem} onClose={() => setIsFormOpen(false)} categories={categories} />}
                    </AnimatePresence>
                </div>
            );
        };

        const Dashboard = ({ categories, activeGlow }) => (
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                {categories.map(cat => (
                    <motion.div 
                        key={cat.id}
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        className={`glare-card aspect-square rounded-[2rem] p-6 flex flex-col justify-between cursor-pointer ${activeGlow === cat.id ? 'glow-pink' : ''}`}
                    >
                        <div className="text-3xl">{cat.icon}</div>
                        <div>
                            <h3 className="text-xl font-semibold">{cat.name}</h3>
                            <p className="text-xs text-gray-500 uppercase tracking-widest mt-1">Category</p>
                        </div>
                    </motion.div>
                ))}
            </div>
        );

        const QuickStack = ({ items }) => {
            const [index, setIndex] = useState(0);
            return (
                <div className="relative h-[60vh] flex items-center justify-center">
                    {items.length > 0 ? (
                        <div className="relative w-72 h-96">
                            {items.slice(index, index + 3).map((item, i) => (
                                <motion.div
                                    key={item.id}
                                    style={{ zIndex: items.length - i }}
                                    animate={{ 
                                        scale: 1 - i * 0.05, 
                                        y: i * -20,
                                        opacity: 1 - i * 0.3
                                    }}
                                    drag="x"
                                    dragConstraints={{ left: 0, right: 0 }}
                                    onDragEnd={(e, info) => {
                                        if (Math.abs(info.offset.x) > 100) setIndex(prev => prev + 1);
                                    }}
                                    className="absolute inset-0 glare-card rounded-3xl p-8 flex flex-col justify-center text-center cursor-grab active:cursor-grabbing"
                                >
                                    <span className="text-pink-500 font-bold mb-2 uppercase text-xs tracking-tighter">{item.type}</span>
                                    <h2 className="text-2xl font-bold">{item.title}</h2>
                                </motion.div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-gray-500">All caught up!</div>
                    )}
                </div>
            );
        };

        const EntryForm = ({ onAdd, onClose, categories }) => {
            const [form, setForm] = React.useState({ title: '', type: 'Task', category: 'work' });
            return (
                <motion.div 
                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6"
                >
                    <motion.div 
                        initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }}
                        className="glare-card w-full max-w-sm rounded-[2.5rem] p-8"
                    >
                        <h2 className="text-2xl font-bold mb-6 text-center">New Entry</h2>
                        <input 
                            autoFocus
                            placeholder="What's happening?"
                            className="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 mb-4 focus:outline-none focus:border-white/30"
                            onChange={e => setForm({...form, title: e.target.value})}
                        />
                        <div className="flex gap-2 mb-6 no-scrollbar overflow-x-auto py-2">
                            {['Task', 'Bill', 'Appt'].map(t => (
                                <button 
                                    key={t}
                                    onClick={() => setForm({...form, type: t})}
                                    className={`px-4 py-2 rounded-full text-sm border ${form.type === t ? 'bg-white text-black' : 'border-white/10'}`}
                                >{t}</button>
                            ))}
                        </div>
                        <div className="flex justify-between items-center mt-4">
                            <button onClick={onClose} className="text-gray-500 px-4">Cancel</button>
                            <button 
                                onClick={() => onAdd(form)}
                                className="bg-white text-black px-8 py-3 rounded-full font-bold shadow-lg shadow-white/10"
                            >
                                Create
                            </button>
                        </div>
                    </motion.div>
                </motion.div>
            );
        };

        const CalendarView = ({ items }) => (
            <div className="glare-card rounded-[2rem] p-6 h-[60vh] flex items-center justify-center text-gray-500">
                Agnostic Calendar Grid (Drag & Drop Logic Ready)
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
