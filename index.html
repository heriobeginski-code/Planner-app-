<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handshake Hub</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* The "Glare" Effect */
        .glare-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8);
        }

        /* The Handshake Glow */
        .glow-pink {
            border-color: #ff007f !important;
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.3);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        /* Conflict Warning */
        .conflict-red { border: 2px solid #ff4b4b !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const CATEGORIES = [
            { id: 'work', name: 'Work', icon: '💼' },
            { id: 'personal', name: 'Personal', icon: '👤' },
            { id: 'kids', name: 'Kids', icon: '👶' }
        ];

        function App() {
            const [view, setView] = useState('dashboard');
            const [activeGlow, setActiveGlow] = useState(null);
            const [items, setItems] = useState(() => JSON.parse(localStorage.getItem('hs_data') || '[]'));
            const [isFormOpen, setIsFormOpen] = useState(false);

            // --- Handshake Handlers ---
            useEffect(() => {
                const handleHandshake = (e) => {
                    if (e.key === 'logic_brain_dump') {
                        const data = JSON.parse(e.newValue);
                        setActiveGlow(data.targetCategory || 'work');
                        // Optional: Add to items if data contains a task
                    }
                };
                window.addEventListener('storage', handleHandshake);
                return () => window.removeEventListener('storage', handleHandshake);
            }, []);

            useEffect(() => {
                localStorage.setItem('hs_data', JSON.stringify(items));
            }, [items]);

            const addItem = (item) => {
                setItems([...items, { ...item, id: Date.now(), done: false }]);
                setIsFormOpen(false);
            };

            return (
                <div className="h-screen w-full flex flex-col relative overflow-hidden bg-[#050505]">
                    
                    {/* UI: Pill Bar */}
                    <div className="absolute top-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-sm">
                        <motion.div 
                            whileHover={{ scale: 1.02 }}
                            whileTap={{ scale: 0.98 }}
                            onClick={() => setIsFormOpen(true)}
                            className="glare-card rounded-full px-6 py-4 flex justify-between items-center cursor-pointer"
                        >
                            <span className="text-gray-400 text-sm font-light">Quick Entry...</span>
                            <div className="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center">+</div>
                        </motion.div>
                    </div>

                    {/* Main Content Area */}
                    <main className="flex-1 pt-32 px-6 overflow-y-auto pb-32">
                        {view === 'dashboard' && (
                            <div className="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
                                {CATEGORIES.map(cat => (
                                    <motion.div 
                                        key={cat.id}
                                        layoutId={cat.id}
                                        className={`glare-card aspect-square rounded-[2.5rem] p-8 flex flex-col justify-between transition-all duration-500 ${activeGlow === cat.id ? 'glow-pink' : ''}`}
                                    >
                                        <div className="text-4xl">{cat.icon}</div>
                                        <h3 className="text-xl font-bold">{cat.name}</h3>
                                    </motion.div>
                                ))}
                            </div>
                        )}

                        {view === 'stack' && <CardStack items={items.filter(i => !i.done)} onDone={(id) => {
                            setItems(items.map(i => i.id === id ? {...i, done: true} : i))
                        }} />}

                        {view === 'calendar' && (
                            <div className="glare-card rounded-[2.5rem] p-8 h-[60vh] flex items-center justify-center text-gray-500 italic">
                                Agnostic Calendar Grid Active
                            </div>
                        )}
                    </main>

                    {/* UI: Navigation */}
                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 glare-card rounded-full p-1.5 flex gap-1 z-50">
                        {['dashboard', 'calendar', 'stack'].map(v => (
                            <button 
                                key={v}
                                onClick={() => setView(v)}
                                className={`px-6 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all ${view === v ? 'bg-white text-black' : 'text-gray-400'}`}
                            >
                                {v}
                            </button>
                        ))}
                    </nav>

                    {/* Entry Modal */}
                    <AnimatePresence>
                        {isFormOpen && <EntryForm onAdd={addItem} onClose={() => setIsFormOpen(false)} />}
                    </AnimatePresence>
                </div>
            );
        }

        const CardStack = ({ items, onDone }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const activeItems = items.slice(currentIndex, currentIndex + 3);

            return (
                <div className="relative h-[60vh] flex items-center justify-center">
                    {activeItems.length > 0 ? (
                        <div className="relative w-72 h-96">
                            {activeItems.map((item, i) => (
                                <motion.div
                                    key={item.id}
                                    drag="x"
                                    dragConstraints={{ left: 0, right: 0 }}
                                    onDragEnd={(e, info) => {
                                        if (info.offset.x > 100) setCurrentIndex(v => v + 1);
                                        if (info.offset.x < -100) onDone(item.id);
                                    }}
                                    className="absolute inset-0 glare-card rounded-[2.5rem] p-10 flex flex-col justify-center text-center cursor-grab active:cursor-grabbing"
                                    style={{ 
                                        zIndex: 10 - i,
                                        scale: 1 - i * 0.05,
                                        y: i * -20,
                                        opacity: 1 - i * 0.2
                                    }}
                                >
                                    <div className="w-12 h-12 rounded-full border-2 border-white/20 mb-6 mx-auto flex items-center justify-center text-xs">
                                        {i + 1}
                                    </div>
                                    <h2 className="text-2xl font-bold">{item.title}</h2>
                                    <p className="text-pink-500 mt-2 uppercase text-[10px] font-bold tracking-widest">{item.type}</p>
                                </motion.div>
                            ))}
                        </div>
                    ) : (
                        <div className="text-gray-600">Stack Clear.</div>
                    )}
                </div>
            );
        };

        const EntryForm = ({ onAdd, onClose }) => {
            const [title, setTitle] = useState('');
            return (
                <motion.div 
                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                    className="fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-6"
                >
                    <motion.div 
                        initial={{ y: 50 }} animate={{ y: 0 }}
                        className="glare-card w-full max-w-sm rounded-[3rem] p-10"
                    >
                        <h2 className="text-2xl font-bold mb-6">Capture</h2>
                        <input 
                            className="w-full bg-white/5 border border-white/10 rounded-2xl p-5 mb-6 outline-none focus:border-white/40"
                            placeholder="What's the play?" 
                            autoFocus
                            value={title}
                            onChange={e => setTitle(e.target.value)}
                        />
                        <div className="flex justify-between items-center">
                            <button onClick={onClose} className="text-gray-500">Cancel</button>
                            <button onClick={() => onAdd({title, type: 'Task'})} className="bg-white text-black px-10 py-3 rounded-full font-bold">Create</button>
                        </div>
                    </motion.div>
                </motion.div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
